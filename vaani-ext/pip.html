<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>VAANI</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #05050f;
        color: #ededec;
        font-family: -apple-system, system-ui, sans-serif;
        overflow: hidden;
      }
      #frame {
        width: 100%;

        display: block;

        position: fixed;

        font-size: 10px;
        font-family: ui-monospace, Menlo, monospace;
        color: rgba(255, 255, 255, 0.45);
        letter-spacing: 0.12em;
        text-transform: uppercase;
        pointer-events: none;
        max-width: calc(100% - 20px);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <iframe id="frame" src="https://vaani-gold.vercel.app/embed?mode=ext" allow="autoplay"></iframe>
